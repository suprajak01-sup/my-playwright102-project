---
version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: ${matrix.os}
autosplit: true
retryOnFailure: true
maxRetries: 1

concurrency: 2
parallelism: 2

matrix:
  os: [win, linux]

env:
  NODE_ENV: testing
  PROJECT_NAME: "Playwright-TestMu-Demo"

secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

pre:
  - npm ci
  - npx playwright install chromium --with-deps

cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

post:
  - node -e "console.log('Test execution completed on: ' + process.platform)"
  - node -e "console.log('Cleaning up temporary files...')"

test:
  - npx playwright test --project=chromium

mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Test-Reports
    path:
      - playwright-report/**
      - test-results/**