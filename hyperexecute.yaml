---
version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

# Matrix configuration to run tests across 2 different OS combinations
runson: ${matrix.os}
autosplit: false # Turn autosplit off as we are defining the test suite manually
retryOnFailure: true
maxRetries: 1

# Controls parallel execution and VM allocation
concurrency: 2
parallelism: 2

matrix:
  os: [win, linux] # Windows 10 (win) and Linux

# Injecting Environment Variables
env:
  NODE_ENV: testing
  PROJECT_NAME: "Playwright-TestMu-Demo"

# Secret Management: The actual value is stored in the HyperExecute Dashboard
secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

# Pre Steps and Dependency Caching
pre:
  - npm install
  - npx playwright install chromium --with-deps

# Dependency Caching
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

# Post Steps
post:
  - echo "Test execution completed on ${matrix.os}"
  - echo "Cleaning up temporary files..."

# --- THIS IS THE FINAL FIX ---
# Define the test suite directly. This is the most robust, cross-platform method.
# It completely avoids shell command differences between Windows and Linux.
testSuites:
  - npx playwright test tests/testmu.spec.ts --project=chromium

# Artifacts Management
mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Test-Reports
    path:
      - playwright-report/**
      - test-results/**
