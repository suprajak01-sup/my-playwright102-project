---
version: 0.1
globalTimeout: 120
testSuiteTimeout: 120
testSuiteStep: 120

# Matrix configuration to run tests across 2 different OS combinations
runson: ${matrix.os}
autosplit: false # We are running one specific command.
retryOnFailure: true
maxRetries: 1

# Controls VM allocation
concurrency: 2
parallelism: 2

matrix:
  os: [win, linux] # Windows 10 (win) and Linux

# --- THIS IS THE FIX ---
# Environment variables set in this 'env' block are correctly
# applied on BOTH Windows and Linux by HyperExecute.
env:
  NODE_ENV: testing
  PROJECT_NAME: "my-playwright102-project"
  PLAYWRIGHT_JUNIT_OUTPUT_NAME: "playwright-report/results.xml"

# Secret Management
secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

# Pre Steps and Dependency Caching
pre:
  - npm install
  - npx playwright install chromium --with-deps

# Dependency Caching
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

# Post Steps
post:
  - echo "Test execution completed"

# Tell HyperExecute where to find the generated test report to populate the UI.
reports:
  - type: junit
    path:
      - playwright-report/results.xml

# This command runs after the environment variable has been set.
# We also force the reporter here to be absolutely sure.
testSuites:
  - npx playwright test --project=chromium --reporter=junit,html

# Artifacts Management
mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Test-Reports
    path:
      - playwright-report/**
      - test-results/**
