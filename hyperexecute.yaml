---
version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

# This groups the job on the Web Automation Dashboard
buildName: "My Playwright HyperExecute Build"
runson: ${matrix.os}
autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 1
parallelism: 1

matrix:
  os: [win, linux]

env:
  NODE_ENV: testing
  PROJECT_NAME: "Playwright-TestMu-Demo"
  BASE_URL: "https://www.lambdatest.com/selenium-playground/"
  
  # --- THE MAGIC FIX ---
  # This environment variable tells the HyperExecute Agent to automatically 
  # bridge Playwright's CDP session to the Web Automation Dashboard!
  LT_ENABLE_PLAYWRIGHT_TELEMETRY: "true"

secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

pre:
  - npm ci
  - npx playwright install chromium --with-deps

cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

post:
  - node post.js

testDiscovery:
  type: raw
  mode: dynamic
  command: node discover.js

testRunnerCommand: npx playwright test $test --project=chromium

reports:
  - type: junit
    path:
      - playwright-report/results.xml

mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Reports
    path:
      - playwright-report/**
  - name: Playwright-Test-Results
    path:
      - test-results/**

jobLabel:
  - playwright-102
  - typescript
