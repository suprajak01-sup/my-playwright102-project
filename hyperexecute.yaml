---
version: 0.1
globalTimeout: 120
testSuiteTimeout: 120
testSuiteStep: 120

# Matrix configuration to run tests across 2 different OS combinations
runson: ${matrix.os}
autosplit: false
retryOnFailure: true
maxRetries: 1

# Controls VM allocation
concurrency: 2
parallelism: 2

matrix:
  os: [win, linux] # Windows 10 (win) and Linux

# Injecting Environment Variables
env:
  NODE_ENV: testing
  PROJECT_NAME: "my-playwright102-project"

# Secret Management
secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

# Pre Steps and Dependency Caching
pre:
  - npm install
  - npx playwright install chromium --with-deps

# Dependency Caching
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

# Post Steps
post:
  - echo "Test execution completed"

# --- THE DEFINITIVE FIX ---
# 'runCommands' is the native HyperExecute directive for non-autosplit execution.
# Playwright will naturally read playwright.config.ts, find the 'tests' folder, 
# and execute everything perfectly on both OS environments.
runCommands:
  - npx playwright test --project=chromium

# Artifacts Management
mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Test-Reports
    path:
      - playwright-report/**
      - test-results/**
