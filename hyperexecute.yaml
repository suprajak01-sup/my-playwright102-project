---
version: 0.1
globalTimeout: 120
testSuiteTimeout: 120
testSuiteStep: 120

# Matrix configuration to run tests across 2 different OS combinations
runson: ${matrix.os}

# Use autosplit: true. This tells HyperExecute to ask Playwright for its test list.
autosplit: true

retryOnFailure: true
maxRetries: 1

# Controls VM allocation
concurrency: 2
parallelism: 2

matrix:
  os: [win, linux] # Windows 10 (win) and Linux

# Injecting Environment Variables
env:
  NODE_ENV: testing
  PROJECT_NAME: "my-playwright102-project"

# Secret Management
secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

# Pre Steps and Dependency Caching
pre:
  - npm install
  - npx playwright install chromium --with-deps

# Dependency Caching
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

# Post Steps
post:
  - echo "Test execution completed"

# --- THE GUARANTEED FIX ---
# This combination is the key. 'autosplit' asks Playwright for its test list,
# and 'reports' tells HyperExecute where the final XML will be.

# 1. Tell HyperExecute to use its native Playwright adapter to find tests.
testDiscovery:
  type: playwright
  mode: dynamic

# 2. Tell HyperExecute how to run EACH test it finds.
# The '$test' variable is automatically injected by HyperExecute.
testRunnerCommand: npx playwright test $test --project=chromium

# 3. Tell HyperExecute where to find the generated test report to populate the UI.
reports:
  - type: junit
    path:
      - playwright-report/results.xml

# Artifacts Management
mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Test-Reports
    path:
      - playwright-report/**
      - test-results/**
