---
version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

# Assign a name to the build for 'https://automation.lambdatest.com/build' dashboard.
buildName: "My Playwright HyperExecute Build"
runson: ${matrix.os}
autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 1
parallelism: 1

matrix:
  os: [win, linux]

env:
  NODE_ENV: testing
  PROJECT_NAME: "Playwright-TestMu-Demo"
  # Highly recommended to use this URL to avoid the 30s timeout issue on the cloud
  BASE_URL: "https://www.lambdatest.com/selenium-playground/" 
  # This tells Playwright whether to connect to a Windows or Linux browser!
  TARGET_OS: ${matrix.os} 

# Secrets must be a dictionary/mapping, not a list with dashes
secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

pre:
  - npm ci
  - npx playwright install chromium --with-deps

cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

post:
  - node post.js

# YOUR DISCOVERY LOGIC - UNCHANGED
testDiscovery:
  type: raw
  mode: dynamic
  command: node discover.js

testRunnerCommand: npx playwright test $test --project=chromium

mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Reports
    path:
      - playwright-report/**
  - name: Playwright-Test-Results
    path:
      - test-results/**

jobLabel:
  - playwright-102
  - typescript
  - testmu-ai
