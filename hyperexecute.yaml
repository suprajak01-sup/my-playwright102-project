---
version: 0.1
globalTimeout: 90
testSuiteTimeout: 90
testSuiteStep: 90

runson: ${matrix.os}
autosplit: true
retryOnFailure: true
maxRetries: 1
concurrency: 3
parallelism: 3

matrix:
  os: [win, linux]

env:
  NODE_ENV: testing
  PROJECT_NAME: "Playwright-TestMu-Demo"
  BASE_URL: "https://www.testmuai.com"

secrets:
  - MY_SECRET_TOKEN
  - API_PASSWORD

pre:
  - npm ci
  - npx playwright install chromium --with-deps

cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

post:
  - node post.js

# discover.js uses no arrow functions or special chars — safe on win & linux
testDiscovery:
  type: raw
  mode: dynamic
  command: node discover.js

testRunnerCommand: npx playwright test $test --project=chromium

mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Reports
    path:
      - playwright-report/**
  - name: Playwright-Test-Results
    path:
      - test-results/**

jobLabel:
  - playwright-102
  - typescript
  - testmu-ai