---
version: 0.1
globalTimeout: 120
testSuiteTimeout: 120
testSuiteStep: 120

# Matrix configuration to run tests across 2 different OS combinations
runson: ${matrix.os}
autosplit: false # We are running one specific command
retryOnFailure: true
maxRetries: 1

# Controls parallel execution
concurrency: 2
parallelism: 2

matrix:
  os: [win, linux] # Windows 10 (win) and Linux

# Injecting Environment Variables
env:
  NODE_ENV: testing
  PROJECT_NAME: "Playwright-TestMu-Demo"

# Secret Management
secrets:
  MY_SECRET_TOKEN:
  API_PASSWORD:

# Pre Steps and Dependency Caching
pre:
  - npm install
  - npx playwright install chromium --with-deps

# Dependency Caching
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules

# Post Steps
post:
  - echo "Test execution completed on ${matrix.os}"

# --- THE GUARANTEED CROSS-PLATFORM FIX ---
# Run the command via an NPM script.
# Both Windows and Linux will correctly execute the 'hyperexecute' script without shell conflicts.
testSuites:
  - npm run hyperexecute

# Artifacts Management
mergeArtifacts: true
uploadArtefacts:
  - name: Playwright-Test-Reports
    path:
      - playwright-report/**
      - test-results/**
